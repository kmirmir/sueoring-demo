<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수어링 - 빠른 실행</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 16px;
        }

        .status {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }

        .status.error {
            border-left-color: #dc3545;
            background: #fff5f5;
        }

        .status.success {
            border-left-color: #28a745;
            background: #f0fff4;
        }

        .button-group {
            display: grid;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .port-list {
            margin-top: 20px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .port-item {
            padding: 10px;
            margin: 5px 0;
            background: white;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .port-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .port-link:hover {
            text-decoration: underline;
        }

        .emoji {
            font-size: 24px;
        }

        .guide {
            margin-top: 30px;
            padding: 20px;
            background: #fff3cd;
            border-radius: 10px;
            border-left: 4px solid #ffc107;
        }

        .guide h3 {
            color: #856404;
            margin-bottom: 10px;
        }

        .guide ol {
            margin-left: 20px;
            color: #856404;
        }

        .guide li {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1><span class="emoji">🤝</span> 수어링 (SueoRing)</h1>
        <p class="subtitle">AI 기반 수어 통역 서비스</p>

        <div id="status" class="status">
            <strong>🔍 서버 확인 중...</strong>
        </div>

        <div class="button-group">
            <button onclick="tryAllPorts()">
                <span class="emoji">🚀</span>
                모든 포트 자동 시도
            </button>
        </div>

        <div class="port-list">
            <h3>📡 시도할 포트:</h3>
            <div class="port-item">
                <span>기본 포트</span>
                <a href="http://localhost:8081" target="_blank" class="port-link">http://localhost:8081</a>
            </div>
            <div class="port-item">
                <span>대체 포트 1</span>
                <a href="http://localhost:8082" target="_blank" class="port-link">http://localhost:8082</a>
            </div>
            <div class="port-item">
                <span>Expo 포트 1</span>
                <a href="http://localhost:19006" target="_blank" class="port-link">http://localhost:19006</a>
            </div>
            <div class="port-item">
                <span>Expo 포트 2</span>
                <a href="http://localhost:19007" target="_blank" class="port-link">http://localhost:19007</a>
            </div>
        </div>

        <div class="guide">
            <h3>💡 서버가 실행되지 않았나요?</h3>
            <ol>
                <li>터미널을 열고 프로젝트 폴더로 이동</li>
                <li><code>npm run web</code> 명령 실행</li>
                <li>서버가 시작되면 위의 포트 중 하나를 클릭</li>
            </ol>
        </div>
    </div>

    <script>
        const ports = [8081, 8082, 19006, 19007];
        let foundPort = null;

        async function checkPort(port) {
            try {
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 1000);

                const response = await fetch(`http://localhost:${port}`, {
                    signal: controller.signal,
                    mode: 'no-cors' // CORS 에러 방지
                });

                clearTimeout(timeoutId);
                return true;
            } catch (error) {
                return false;
            }
        }

        async function findServer() {
            const statusEl = document.getElementById('status');

            for (const port of ports) {
                statusEl.innerHTML = `<strong>🔍 포트 ${port} 확인 중...</strong>`;

                const isRunning = await checkPort(port);

                if (isRunning) {
                    foundPort = port;
                    const url = `http://localhost:${port}`;
                    statusEl.className = 'status success';
                    statusEl.innerHTML = `
                        <strong>✅ 서버를 찾았습니다!</strong><br>
                        <a href="${url}" target="_blank" style="color: #28a745; font-weight: bold;">
                            ${url}
                        </a>
                    `;

                    // 자동으로 새 탭에서 열기
                    setTimeout(() => {
                        window.open(url, '_blank');
                    }, 500);

                    return;
                }
            }

            // 서버를 찾지 못함
            statusEl.className = 'status error';
            statusEl.innerHTML = `
                <strong>❌ 실행 중인 서버를 찾을 수 없습니다</strong><br>
                <small>터미널에서 <code>npm run web</code>을 실행하세요</small>
            `;
        }

        function tryAllPorts() {
            ports.forEach(port => {
                window.open(`http://localhost:${port}`, '_blank');
            });
        }

        // 페이지 로드 시 자동으로 서버 찾기
        window.addEventListener('load', findServer);
    </script>
</body>
</html>
